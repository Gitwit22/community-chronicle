# Cloudflare Pages deployment configuration for Community Chronicle
# Non-secret build-time vars are declared here.
# Sensitive values (API tokens) must be set via `wrangler secret put` or the CF Pages dashboard.
# See scripts/setup-cf-secrets.sh for the full secret setup workflow.

name = "community-chronicle"
pages_build_output_dir = "dist"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]

[env.production.vars]
ENVIRONMENT                                    = "production"
VITE_API_BASE_URL                              = "https://api.nxtlvl.app/api"
VITE_PLATFORM_API_URL                          = "https://api.nxtlvl.app"
VITE_SUITE_URL                                 = "https://suite.nxtlvl.app"
VITE_DOC_INTEL_API_URL                         = "https://doc-intel.nxtlvl.app"
VITE_DOC_TYPE_CONFIDENCE_THRESHOLD             = "0.6"

# Llama extraction schema IDs — non-secret config identifiers
